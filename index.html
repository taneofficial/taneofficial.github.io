<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>tane.co</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5efe6;
}

/* ÜST BAR */

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:20px 60px;
}

.logo{
font-size:28px;
font-weight:bold;
color:#6E1F2F;
}

.logo span{
display:block;
font-size:12px;
color:#444;
}

.search{
display:flex;
}

.search input{
padding:8px;
width:200px;
border:1px solid #ccc;
}

.search button{
background:#6E1F2F;
color:white;
border:none;
padding:8px 15px;
cursor:pointer;
}

/* MENÜ */

.navbar{
display:flex;
justify-content:center;
gap:40px;
background:#6E1F2F;
padding:15px;
position:sticky;
top:0;
z-index:1000;
}

.navbar a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* HERO */

.hero{
display:flex;
justify-content:center;
margin-top:40px;
}

.hero img{
width:500px;
border-radius:6px;
}

/* KATEGORİLER */

.categories{
display:flex;
justify-content:center;
gap:30px;
margin:60px;
}

.card{
background:white;
width:220px;
text-align:center;
padding:20px;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.card img{
width:100%;
}

.card button{
margin-top:10px;
background:#6E1F2F;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
border-radius:5px;
transition:0.3s;
}

.card button:hover{
background:#8C2F42;
}

</style>
</head>

<body>

<div class="header">

<div class="logo">
tane.co
<span>Handmade Designs</span>
<span>Made For You</span>
</div>

<div class="search">
<input placeholder="Ürün Ara">
<button>Ara</button>
</div>

</div>

<div class="navbar">
<a href="#">Anasayfa</a>
<a href="#">Ürün Kategorisi</a>
<a href="#">Siparişlerim</a>
<a href="#">Sepetim</a>
</div>

<div class="hero">
<img src="https://images.unsplash.com/photo-1519710164239-da123dc03ef4?auto=format&fit=crop&w=900&q=60">
</div>

<div class="categories">

<div class="card">
<img src="https://images.unsplash.com/photo-1590874103328-eac38a683ce7?auto=format&fit=crop&w=400&q=60">
<h3>Boncuk Çanta</h3>
<button>Ürünleri Gör</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?auto=format&fit=crop&w=400&q=60">
<h3>Ev Dekorasyonu</h3>
<button>Ürünleri Gör</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1608042314453-ae338d80c427?auto=format&fit=crop&w=400&q=60">
<h3>Kişiye Özel</h3>
<button>Ürünleri Gör</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1606800052052-a08af7148866?auto=format&fit=crop&w=400&q=60">
<h3>Düğün & Nişan</h3>
<button>Ürünleri Gör</button>
</div>

</div>

</body>
</html>
